<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank AI Bias Detector</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; line-height: 1.6; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; }
        button { background: #28a745; color: white; padding: 10px 20px; border: none; cursor: pointer; width: 100%; font-size: 16px; }
        #result { margin-top: 20px; padding: 15px; border-radius: 5px; display: none; }
        .approved { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .rejected { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .report { font-style: italic; margin-top: 10px; color: #555; border-top: 1px solid #ddd; padding-top: 10px; }
    </style>
</head>
<body>
    <h2>Bank Loan AI & Bias Detector</h2>
    <div class="form-group">
        <label>Age</label>
        <input type="number" id="age" value="22">
    </div>
    <div class="form-group">
        <label>Sex</label>
        <select id="sex">
            <option value="male">Male</option>
            <option value="female" selected>Female</option>
        </select>
    </div>
    <div class="form-group">
        <label>Credit Amount</label>
        <input type="number" id="credit" value="5000">
    </div>
    <div class="form-group">
        <label>Purpose</label>
        <select id="purpose">
            <option value="car">Car</option>
            <option value="education" selected>Education</option>
            <option value="business">Business</option>
        </select>
    </div>
    <button onclick="checkLoan()">Check Loan Status</button>

    <div id="result">
        <h3 id="statusText"></h3>
        <p class="report" id="reportText"></p>
    </div>

    <script>
        async function checkLoan() {
            const data = {
                "Age": parseInt(document.getElementById('age').value),
                "Sex": document.getElementById('sex').value,
                "Job": 2,
                "Housing": "rent",
                "Saving acc": "little",
                "Checking a": "moderate",
                "Credit amount": parseInt(document.getElementById('credit').value),
                "Duration": 24,
                "Purpose": document.getElementById('purpose').value
            };

            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            document.getElementById('statusText').innerText = "Processing...";
            document.getElementById('reportText').innerText = "";

            try {
                const response = await fetch('http://127.0.0.1:5000/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();

                document.getElementById('statusText').innerText = "Loan Status: " + result.loan_status;
                document.getElementById('reportText').innerText = "AI Insight: " + result.fairness_report;
                
                resultDiv.className = result.loan_status === "Approved" ? "approved" : "rejected";
            } catch (error) {
                document.getElementById('statusText').innerText = "Error: Server not running!";
            }
        }
    </script>
</body>
</html>
