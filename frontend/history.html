<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FairScan AI | History</title>
    <style>
        :root { --primary: #3BC1A8; --bg: #051614; --card: #0a221f; --text: #e0f2f1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 40px; }
        .table-box { width: 100%; background: var(--card); border-radius: 15px; border: 1px solid #1a3a35; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #14302b; }
        th { color: var(--primary); text-transform: uppercase; font-size: 0.8rem; }
        .status { font-weight: bold; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; }
        .approved { background: rgba(59,193,168,0.2); color: var(--primary); }
        .rejected { background: rgba(255,77,77,0.2); color: #ff4d4d; }
        .back-btn { float: right; color: var(--primary); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Audit History <a href="index.html" class="back-btn">← Back to Auditor</a></h1>
    
    <div class="table-box">
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Name</th>
                    <th>Loan Amount</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="history-body">
                </tbody>
        </table>
    </div>

    <script>
        async function loadHistory() {
            try {
                const res = await fetch('http://localhost:3000/api/history');
                const data = await res.json();
                const tbody = document.getElementById('history-body');
                tbody.innerHTML = ""; 

                data.forEach(item => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${new Date(item.date).toLocaleDateString()}</td>
                            <td>${item.userName || "Unknown"}</td>
                            <td>$${item.loanAmount}</td>
                            <td><span class="status ${item.status.toLowerCase()}">${item.status}</span></td>
                        </tr>`;
                });
            } catch(e) { console.log("Database server not running."); }
        }
        window.onload = loadHistory;
    </script>
</body>
</html>
