<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>FairScan AI | Auditor</title>
    <style>
        :root {
            --primary: #3BC1A8;
            --bg: #051614;
            --card: #0a221f;
            --text: #e0f2f1;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--card);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #1a3a35;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .field {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #14302b;
        }

        label {
            font-size: 10px;
            color: var(--primary);
            font-weight: bold;
            text-transform: uppercase;
        }

        input {
            background: transparent;
            border: none;
            color: white;
            border-bottom: 1px solid #333;
            width: 100%;
            outline: none;
            margin-top: 5px;
        }

        .btn {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            background: var(--primary);
            color: var(--bg);
            border: none;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
        }

        #result {
            margin-top: 30px;
            display: none;
            padding: 20px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-left: 8px solid var(--primary);
        }
    </style>
</head>

<body>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1 id="welcome">Welcome!</h1>
            <a href="history.html" style="color: var(--primary); text-decoration: none; font-weight: bold;">📜 View
                History</a>
            <button onclick="logout()"
                style="background: #ff4d4d; color: white; border: none; padding: 5px 15px; border-radius: 20px; cursor: pointer; font-weight: bold;">Logout</button>
        </div>

        <div id="dynamic-form" class="grid">Synchronizing...</div>
        <button class="btn" onclick="runAudit()">RUN AI RISK ANALYSIS</button>

        <div id="result">
            <h2 id="status"></h2>
            <p id="report"></p>
            <button class="btn" style="background:#222; color:white;" onclick="location.reload()">New Audit</button>
        </div>
    </div>

    <script>
        function logout() {
            localStorage.removeItem('userName');
            window.location.href = "auth.html";
        }
        const user = localStorage.getItem('userName') || "Guest";
        document.getElementById('welcome').innerText = `Hello, ${user}`;

        async function loadUI() {
            const res = await fetch('http://127.0.0.1:5000/get_features');
            const data = await res.json();
            const grid = document.getElementById('dynamic-form');
            grid.innerHTML = "";
            data.features.forEach(f => {
                grid.innerHTML += `<div class="field"><label>${f.replace(/_/g, ' ')}</label><input type="text" id="${f}" placeholder="0"></div>`;
            });
        }

        async function runAudit() {
            const payload = {};
            document.querySelectorAll('input').forEach(i => payload[i.id] = i.value);

            try {
                // 1. Get AI Prediction (Python)
                const aiRes = await fetch('http://127.0.0.1:5000/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const aiData = await aiRes.json();

                document.getElementById('result').style.display = "block";
                document.getElementById('status').innerText = aiData.loan_status;
                document.getElementById('report').innerText = aiData.fairness_report;

                // 2. Save to History (Node.js)
                fetch('http://localhost:3000/api/save-audit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userName: user,
                        loanAmount: payload.loan_amount,
                        status: aiData.loan_status
                    })
                });
            } catch (e) { alert("Check Backend!"); }
        }
        window.onload = loadUI;
    </script>
</body>

</html>
