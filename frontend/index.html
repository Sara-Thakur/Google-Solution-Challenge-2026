<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TrustFlow AI | Pro Auditor</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --teal: #051614; --mint: #3BC1A8; --glass: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--teal); color: white; display: flex; justify-content: center; padding: 40px; margin: 0; }
        .container { max-width: 1000px; width: 100%; background: var(--glass); backdrop-filter: blur(20px); border-radius: 30px; padding: 40px; border: 1px solid rgba(59, 193, 168, 0.2); }
        h1 { color: var(--mint); margin: 0 0 10px 0; font-weight: 800; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-top: 30px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 0.7rem; color: var(--mint); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; font-weight: 700; }
        input, select { background: rgba(0,0,0,0.3); border: 1px solid rgba(59,193,168,0.3); padding: 12px; border-radius: 10px; color: white; outline: none; }
        input:focus { border-color: var(--mint); box-shadow: 0 0 10px rgba(59,193,168,0.3); }
        button { width: 100%; padding: 20px; background: var(--mint); color: var(--teal); border: none; border-radius: 15px; font-weight: 800; cursor: pointer; margin-top: 30px; transition: 0.3s; }
        button:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(59,193,168,0.4); }
        #result { margin-top: 30px; padding: 25px; border-radius: 20px; display: none; background: rgba(0,0,0,0.2); border-left: 8px solid var(--mint); }
        .badge { display: inline-block; padding: 5px 15px; border-radius: 50px; font-size: 0.8rem; font-weight: 800; margin-bottom: 10px; }
        .status-Approved { background: var(--mint); color: var(--teal); }
        .status-Rejected { background: #ff5e57; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>TrustFlow AI</h1>
        <p style="opacity: 0.7;">Enterprise Generative Risk & Fraud Auditor</p>
        
        <div class="grid" id="form-grid">
            <div class="field"><label>Credit Score</label><input type="number" id="credit_score" value="700"></div>
            <div class="field"><label>Monthly Income</label><input type="number" id="monthly_income" value="5000"></div>
            <div class="field"><label>Loan Amount</label><input type="number" id="loan_amount" value="10000"></div>
            <div class="field"><label>DTI Ratio</label><input type="number" step="0.01" id="debt_to_income_ratio" value="0.3"></div>
            <div class="field"><label>Age</label><input type="number" id="age" value="30"></div>
            <div class="field"><label>Employment</label><select id="employment_status"><option value="Full-time">Full-time</option><option value="Part-time">Part-time</option></select></div>
            <div class="field"><label>Purpose</label><select id="loan_purpose"><option value="Home">Home</option><option value="Education">Education</option></select></div>
            <div class="field"><label>Delinquency Hist.</label><select id="delinquency_history"><option value="No">No History</option><option value="Yes">Prior Issues</option></select></div>
        </div>

        <button onclick="runAudit()">INITIATE SYSTEM AUDIT</button>

        <div id="result">
            <div id="badge_status" class="badge"></div>
            <div id="confidence" style="font-weight: 800; font-size: 1.2rem; margin-bottom: 15px;"></div>
            <div id="audit_report" style="line-height: 1.6; opacity: 0.9;"></div>
        </div>
    </div>

    <script>
        async function runAudit() {
            const btn = document.querySelector('button');
            btn.innerText = "AUDITING PATTERNS...";
            const payload = {};
            document.querySelectorAll('input, select').forEach(el => payload[el.id] = el.value);

            try {
                const response = await fetch('http://127.0.0.1:5000/predict', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const res = await response.json();

                const resDiv = document.getElementById('result');
                resDiv.style.display = 'block';
                resDiv.style.borderColor = res.loan_status === "Approved" ? "#3BC1A8" : "#ff5e57";
                
                const badge = document.getElementById('badge_status');
                badge.innerText = res.loan_status;
                badge.className = `badge status-${res.loan_status}`;
                
                document.getElementById('confidence').innerText = `AI Confidence: ${res.confidence}%`;
                document.getElementById('audit_report').innerText = res.fairness_report;
            } catch (err) {
                alert("Server Error! Check if app.py is running.");
            } finally {
                btn.innerText = "INITIATE SYSTEM AUDIT";
            }
        }
    </script>
</body>
</html>
