<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FairScan AI | Access Portal</title>
    <style>
        :root { --primary: #3BC1A8; --bg: #051614; --card: #0a221f; --text: #e0f2f1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .auth-container { width: 380px; background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid #1a3a35; text-align: center; }
        input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid #1a3a35; padding: 12px; border-radius: 8px; color: white; margin-bottom: 20px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--primary); }
        .btn { width: 100%; padding: 15px; background: var(--primary); color: var(--bg); border: none; font-weight: bold; border-radius: 10px; cursor: pointer; font-size: 1rem; }
        .toggle { margin-top: 20px; font-size: 0.9rem; opacity: 0.7; }
        .toggle span { color: var(--primary); cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="auth-container">
    <h2 id="title" style="color: var(--primary);">Login</h2>
    <div id="name-box" style="display: none;"><input type="text" id="name" placeholder="Full Name"></div>
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="pass" placeholder="Password">
    <button class="btn" onclick="handleAuth()">CONTINUE</button>
    <div class="toggle" id="toggle-text">New here? <span onclick="switchMode()">Create Account</span></div>
</div>

<script>
    let isLogin = true;
    function switchMode() {
        isLogin = !isLogin;
        document.getElementById('title').innerText = isLogin ? "Login" : "Sign Up";
        document.getElementById('name-box').style.display = isLogin ? "none" : "block";
        document.getElementById('toggle-text').innerHTML = isLogin ? 'New here? <span onclick="switchMode()">Create Account</span>' : 'Have account? <span onclick="switchMode()">Login</span>';
    }

    async function handleAuth() {
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('pass').value;
        const endpoint = isLogin ? '/api/login' : '/api/signup';
        const payload = isLogin ? { email, password } : { name, email, password };

        try {
            const res = await fetch(`http://localhost:3000${endpoint}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('userName', data.name); // Save Name
                window.location.href = "index.html";
            } else { alert(data.error); }
        } catch (e) { alert("Server Down! Run 'node server.js'"); }
    }
</script>
</body>
</html>
